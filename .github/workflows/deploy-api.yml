name: Deploy API to AWS ECS Fargate

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false  # never cancel a deploy mid-flight

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          SHA_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:$SHA_TAG"
          docker build -t "$IMAGE" -t "$REGISTRY/$REPOSITORY:latest" ./api
          docker push "$IMAGE"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_DEFINITION_FAMILY }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Smoke-test the live ALB
        if: ${{ vars.API_PUBLIC_URL != '' }}
        run: |
          set -e
          for i in 1 2 3 4 5; do
            if curl -fsS "${{ vars.API_PUBLIC_URL }}/stats" > /dev/null; then
              echo "Smoke OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying…"
            sleep 6
          done
          echo "Smoke FAILED" >&2
          exit 1
