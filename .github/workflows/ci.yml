name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nafadpay_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: |
          cd api
          pip install -e ".[dev]"
      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://admin:test@localhost:5432/nafadpay_test
        run: |
          cd api
          pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: |
          cd frontend
          npm ci || npm install
      - name: Build
        run: |
          cd frontend
          npm run build

  compose:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot stack
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Wait for API
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8000/stats && break
            echo "Waiting for API... ($i/60)"
            sleep 3
          done
      - name: Verify endpoints
        run: |
          curl -fsS http://localhost:8000/stats
          curl -fsS -X POST "http://localhost:8000/simulate/batch?n=10"
          curl -fsS "http://localhost:8000/transactions?limit=5"
      - name: Tear down
        if: always()
        run: docker compose down -v
