# NAFAD-PAY Group 2 — full stack via docker compose up
# Boots: postgres (seeded with 100k rows) + api + frontend

services:
  postgres:
    image: postgres:16-alpine
    container_name: nafad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nafadpay}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./data:/data:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-nafadpay}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: ./api
    container_name: nafad-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-nafadpay}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    container_name: nafad-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pgdata:
    name: nafad-pay-pgdata
