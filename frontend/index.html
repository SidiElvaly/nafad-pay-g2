<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAFAD-PAY · Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#eef4ff',
                100: '#dbe6ff',
                200: '#bccfff',
                300: '#8eaaff',
                400: '#6080f5',
                500: '#3157e0',
                600: '#2845c8',
                700: '#1f37a0',
                800: '#1a2d7e',
                900: '#152658',
              },
              accent: {
                400: '#a78bfa',
                500: '#8b5cf6',
                600: '#7c3aed',
              },
              success: '#10b981',
              danger: '#ef4444',
            },
            keyframes: {
              'slide-in-right': {
                '0%':   { transform: 'translateX(120%)', opacity: '0' },
                '100%': { transform: 'translateX(0)',    opacity: '1' },
              },
              'fade-in': {
                '0%':   { opacity: '0', transform: 'translateY(4px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'pulse-dot': {
                '0%, 100%': { transform: 'scale(1)',   opacity: '1'   },
                '50%':      { transform: 'scale(1.6)', opacity: '0.4' },
              },
            },
            animation: {
              'slide-in-right': 'slide-in-right 0.25s ease-out',
              'fade-in':        'fade-in 0.4s ease-out',
              'pulse-dot':      'pulse-dot 1.6s ease-in-out infinite',
            },
            boxShadow: {
              'card':       '0 1px 2px 0 rgba(15, 23, 42, 0.04), 0 1px 3px 0 rgba(15, 23, 42, 0.06)',
              'card-hover': '0 6px 24px -4px rgba(49, 87, 224, 0.12), 0 2px 6px -1px rgba(15, 23, 42, 0.08)',
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-feature-settings: 'cv11', 'ss01';
      }
      .bg-mesh {
        background-color: #f8fafc;
        background-image:
          radial-gradient(at 12% 0%,  rgba(49, 87, 224, 0.08) 0px, transparent 50%),
          radial-gradient(at 88% 0%,  rgba(139, 92, 246, 0.06) 0px, transparent 50%);
      }
      .scrollbar-thin::-webkit-scrollbar          { height: 6px; width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-thumb    { background: #cbd5e1; border-radius: 999px; }
      .scrollbar-thin::-webkit-scrollbar-track    { background: transparent; }
    </style>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>
  <body class="bg-mesh text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
